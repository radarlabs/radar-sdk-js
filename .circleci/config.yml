version: 2.1

jobs:
  install:
    docker:
      - image: cimg/node:24.13.1
    steps:
      - checkout
      - restore_cache:
          keys:
            - npm-deps-{{ checksum "package-lock.json" }}
      - run:
          name: Install dependencies
          command: npm ci
      - save_cache:
          key: npm-deps-{{ checksum "package-lock.json" }}
          paths:
            - node_modules
      - persist_to_workspace:
          root: .
          paths:
            - .

  typecheck:
    docker:
      - image: cimg/node:24.13.1
    steps:
      - attach_workspace:
          at: .
      - run:
          name: Typecheck
          command: npm run typecheck

  build:
    docker:
      - image: cimg/node:24.13.1
    steps:
      - attach_workspace:
          at: .
      - run:
          name: Build all packages
          command: npm run build:all

  test:
    docker:
      - image: cimg/node:24.13.1
    steps:
      - attach_workspace:
          at: .
      - run:
          name: Run tests
          command: npm run test
      - store_artifacts:
          path: coverage
          destination: coverage

workflows:
  ci:
    jobs:
      - install
      - typecheck:
          requires:
            - install
      - build:
          requires:
            - install
      - test:
          requires:
            - install
